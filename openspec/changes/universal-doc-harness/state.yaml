          bearing-proven test (neutering the normalize call fails it with
          the same byte-index-10 DOS-timestamp signature). Review budget:
          ~860 total changed lines vs the 400 budget — size:exception ruled
          defensible by both rounds (final wiring slice; remediation belongs
          with its slice; splitting would fragment the reviewable unit),
          recorded in the PR body per maintainer precedent under auto-chain.
