          de-duplicated into domain/docx_structure.py:sections_index; last
          tesina literal (collection.py "tesina/context" tag) fixed to
          "context". App-layer unit-test gaps closed (asset/context/pipeline).
          FRESH-REVIEW ROUND 1: NOT-READY — 1 CRITICAL (curated-index.md
          leaked into the evidence pipeline: collect_sources and
          read_context_texts skipped only "index.md"/_-prefixed, so the new
          file was collected as a "confirmado" source and could trigger
          false-positive contradiccion/dato_sensible facts; reviewer
          reproduced live) + 1 WARNING (pipeline --help omitted ingest).
          Remediated 4f0c86f: skip rule centralized in new
          domain/context_index_files.py (TOPIC_QA_INDEX_FILENAME,
          CURATED_INDEX_FILENAME, is_context_content_filename) consumed by
          the writer and both readers; concern skeletons remain collected
          (contract-backed by design.md Context Layout/Data Flow, locked by
          test). 1ce8a36 fixed the help text. DETERMINISM BUG (orchestrator-
          reproduced during recovery: task 8.6's full-pipeline byte-
          determinism test failed intermittently in full-suite runs):
          root-caused to python-docx's _ZipPkgWriter using ZipFile.writestr
          with no ZipInfo — stdlib stamps each zip entry with wall-clock
