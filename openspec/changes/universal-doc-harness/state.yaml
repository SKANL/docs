change: universal-doc-harness
project: docs
artifact_store: hybrid
execution_mode: interactive
delivery_strategy: auto-chain
chain_strategy: stacked-to-main
strict_tdd: true
test_command: uv run pytest
phases:
  explore:
    status: done
    engram_topic: sdd/universal-doc-harness/explore
  propose:
    status: done
    artifact: proposal.md
    engram_topic: sdd/universal-doc-harness/proposal
  spec:
    status: done
    artifact: specs/
    engram_topic: sdd/universal-doc-harness/spec
  design:
    status: done
    artifact: design.md
    engram_topic: sdd/universal-doc-harness/design
  tasks:
    status: done
    artifact: tasks.md
    engram_topic: sdd/universal-doc-harness/tasks
  apply:
    status: in_progress
    engram_topic: sdd/universal-doc-harness/apply-progress
    next_slice: PR5
    note: >-
      Task checkboxes in tasks.md are the source of truth for slice
      progress; merge apply-progress in engram, never overwrite.
    slices:
      PR1:
        status: implemented
        branch: refactor/pr1-sentinel-rename-asset-generalization
        tasks: 1.1-1.10 complete
        tests: 787 passed, 7 skipped (baseline was 771/7)
        review: >-
          Fresh-context review found 1 WARNING (asset-kind generalization
          incomplete); remediated in commit efca3fc; re-review verdict
          MERGE-READY. Residual follow-up (pre-existing, unreachable in
          current docx-only wiring): remove_asset resolves bare stems to
          .docx under multi-kind configs — track before PR5/PR6 configure
          a second asset kind. RESOLVED 2026-07-04 (user-ordered, ahead of
          PR4) via fix branch fix/remove-asset-multi-kind-stems (commits
          aa31e9b + 137c8ec): bare stems resolve across configured kinds,
          single-kind non-docx configs resolve to their own extension,
          overlapping-kind matches deduped; fresh-context review verdict
          MERGE-READY after one remediation round (799 passed / 7 skipped).
      PR2:
        status: merged
        branch: refactor/pr2-repository-port-segregation
        tasks: 2.1-2.6 complete
        tests: 790 passed, 7 skipped (baseline was 787/7)
        pr: https://github.com/SKANL/docs/pull/2
        commits:
          - 8acb700 refactor(ports) segregate fat DocumentRepository into three narrow ports
          - b714efe chore(sdd) mark PR2 tasks 2.1-2.6 complete
        note: >-
          docx_assembly.py/context_pack.py never actually imported the fat
          port (design.md's mention didn't match current code); only
          documents.py and context.py did. DocumentService depends on a
          composed DocumentLifecycleRepository protocol (all three narrow
          ports) since it genuinely needs registry+content+template access.
      PR3:
        status: merged
        branch: refactor/pr3-cli-composition-root-split
        tasks: 3.1-3.5 complete
        tests: 793 passed, 7 skipped (baseline was 790/7)
        pr: https://github.com/SKANL/docs/pull/3
        note: >-
          Merged via GitHub PR #3 (merge commit 9a95ca4) after fresh-context
          review with zero findings. New
          tests/integration/test_cli_composition_root.py is the genuine RED
          anchor for this slice (test_cli_core.py already pre-existed and
          could not fail before the split). No ingest placeholder module
          added — out of scope, zero ingest commands exist yet (PR5/PR6
          own that). --help output diffed byte-identical before/after.
      PR4:
        status: merged
        branch: refactor/pr4-renderer-registry-stage-plan
        tasks: 4.1-4.10 complete
        tests: 818 passed, 7 skipped (baseline was 799/7; 812/7 before remediation)
        pr: https://github.com/SKANL/docs/pull/5
        commits:
          - 763b37c refactor(render) introduce renderer port and registry, make assemble stage plan data-driven
          - 5c8dc31 feat(cli) resolve output renderer from config in the pipeline command
          - d08bc08 test(application) prove renderer extensibility with a fake txt renderer
          - plus the chore(sdd) commit carrying this state.yaml/tasks.md update
        note: >-
          domain/pipeline.py:pipeline_stage_plan now takes the assemble
          stage tuple as a caller-supplied argument instead of a hardcoded
          _ASSEMBLE_STAGES constant; _PREP_STAGES stays a domain constant
          (format-agnostic, no deviation there). DocxAssemblyService renamed
          in place to DocxRendererAdapter (same module path) implementing
          DocumentRendererPort; tesina-draft.docx/tesina-body.docx became
          config["output"]["draft_name"/"body_name"] with backward-compatible
          defaults. cli/_shared.py Deps builds a self.renderers registry and
          exposes resolve_renderer()/Deps.resolve_renderer(config), raising a
          clear Spanish error on an unregistered format (no silent DOCX
          fallback). Extensibility proven by a test-only fake "txt" renderer
          in tests/unit/application/test_renderer_registry.py — zero edits to
          domain/pipeline.py. Determinism re-verified via double-run script
          (two independent Deps instances, identical 13-stage output).
          REMEDIATION (fresh-context review, same branch, 2026-07-04): 1
          CRITICAL fixed — the renderer registry was built but never
          consulted at runtime (PipelineService was fixed-wired to the DOCX
          renderer regardless of config["output"]["format"]); wired
          deps.resolve_renderer(config) into core_app.py's pipeline command
          and threaded the resolved renderer through
          PipelineService.run_pipeline/_stage_callables. 3 WARNINGs fixed —
          (a) format-audit-docx/qa-docx/verify_all now read the actual built
          path (or a config-driven draft_name fallback) instead of
          re-deriving the hardcoded default, so a custom draft_name no
          longer risks a missing-file error or a stale-file audit; (b)
          pipeline_stage_plan raises ValueError when assemble/all is called
          without an assemble argument instead of silently returning an
          empty/short stage list; (c) history rewritten (git reset --soft +
          re-commit, branch never pushed) so every commit on the branch now
          has a green suite — the prior four-way split shipped tests
          importing resolve_renderer before it existed; because the rename,
          the registry in cli/_shared.py and the renderer threading are
          mutually import-coupled, the rewrite groups them as one
          refactor(render) work unit followed by feat(cli) wiring and the
          test(application) extensibility proof. 3 SUGGESTIONs
          addressed — tasks.md 4.6/4.7 original wording restored with
          remediation notes appended (not overwritten); stale
          "RENDERERS registry in cli/_shared.py" / "DocxAssemblyService"
          references reworded in document_renderer_port.py and
          tool_resolver_adapter.py; the private-helper-only output-name test
          augmented with a behavior-level build() test. Final: 818 passed, 7
          skipped. Fresh-context re-review of the final branch (2026-07-05):
          MERGE-READY, zero findings; reviewer proved the CRITICAL fix is
          load-bearing by reverting the core_app.py wiring in a disposable
          worktree and observing the unregistered-format test fail. Every
          commit verified green in a clean worktree (812/7 -> 813/7 -> 818/7
          -> 818/7). Merged to main 2026-07-05 via GitHub PR #5 (merge
          commit 7777e4f, branch deleted); main verified green post-merge
          (818 passed, 7 skipped). Review budget 538 total changed lines
          (465 excluding openspec bookkeeping) — over the 400 budget; the
          overage is the review remediation belonging to this work unit,
          recorded as size:exception in the PR body per maintainer
          instruction under auto-chain.
  verify:
    status: pending
    engram_topic: sdd/universal-doc-harness/verify-report
  archive:
    status: pending
    engram_topic: sdd/universal-doc-harness/archive-report
notes:
  - Slice PR5 task 5.1 (opendataloader-pdf maturity spike) is a blocking gate
    before any task that locks the PDF dependency (5.6, 6.3, 6.4).
  - Task 5.1 spike COMPLETED 2026-07-04 (user-ordered, ahead of PR5) — GATE
    PASS with conditions; v2.4.7 Apache-2.0, requires Java 11+ (resolve via
    ToolResolverPort), one batched convert() call per inbox scan (JVM spawn
    cost), hybrid/OCR modes must stay off for determinism. Details in
    tasks.md 5.1 and Engram topic sdd/universal-doc-harness/pdf-spike.
  - Each slice PR merges to main in order; main must stay green after every merge.
  - Fresh-context review required before each commit/PR (PR rule).
