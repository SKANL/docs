          instruction under auto-chain.
      PR8:
        status: implemented
        branch: feat/pr8-pipeline-wiring
        tasks: 8.1-8.8 complete
        tests: 923 passed, 7 skipped (baseline was 895/7; 911/7 before remediation rounds)
        commits:
          - 9b0d023 refactor(document-pipeline) de-duplicate _sections_index into domain
          - 6a7b759 fix(document-pipeline) drop last tesina literal from collection.py
          - eea12fb feat(document-pipeline) add ingest stage_set to pipeline_stage_plan
          - 9ae6f3b feat(document-pipeline) wire ingest/build-context-files/build-context-index
          - b1fb2f2 test(document-pipeline) add missing unit tests for asset/context/pipeline
          - 81d4717 test(document-pipeline) prove full pipeline determinism end to end
          - 07a8c4f docs(sdd) close out PR8 tasks and record index.md collision resolution
          - 4f0c86f fix(context-curation) stop curated-index.md leaking into evidence pipeline
          - 1ce8a36 docs(cli) advertise ingest stage_set in pipeline --help text
          - 8aeead6 fix(docx-assembly) normalize zip entry timestamps for determinism
          - e24b729 test(docx-assembly) lock embed-branch zip timestamp normalization
          - plus the chore(sdd) commit carrying this state.yaml update
        note: >-
          Final slice. domain/pipeline.py gained the ingest stage_set
          (_INGEST_STAGES module constant, format-agnostic like _PREP_STAGES —
          documented deviation from design.md's caller-supplied sketch);
          PipelineService gained ingest_service and three stage callables
