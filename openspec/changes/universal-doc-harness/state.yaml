          added — out of scope, zero ingest commands exist yet (PR5/PR6
          own that). --help output diffed byte-identical before/after.
      PR4:
        status: merged
        branch: refactor/pr4-renderer-registry-stage-plan
        tasks: 4.1-4.10 complete
        tests: 818 passed, 7 skipped (baseline was 799/7; 812/7 before remediation)
        pr: https://github.com/SKANL/docs/pull/5
        commits:
          - 763b37c refactor(render) introduce renderer port and registry, make assemble stage plan data-driven
          - 5c8dc31 feat(cli) resolve output renderer from config in the pipeline command
          - d08bc08 test(application) prove renderer extensibility with a fake txt renderer
          - plus the chore(sdd) commit carrying this state.yaml/tasks.md update
        note: >-
          domain/pipeline.py:pipeline_stage_plan now takes the assemble
          stage tuple as a caller-supplied argument instead of a hardcoded
          _ASSEMBLE_STAGES constant; _PREP_STAGES stays a domain constant
          (format-agnostic, no deviation there). DocxAssemblyService renamed
          in place to DocxRendererAdapter (same module path) implementing
          DocumentRendererPort; tesina-draft.docx/tesina-body.docx became
          config["output"]["draft_name"/"body_name"] with backward-compatible
          defaults. cli/_shared.py Deps builds a self.renderers registry and
          exposes resolve_renderer()/Deps.resolve_renderer(config), raising a
          clear Spanish error on an unregistered format (no silent DOCX
          fallback). Extensibility proven by a test-only fake "txt" renderer
          in tests/unit/application/test_renderer_registry.py — zero edits to
          domain/pipeline.py. Determinism re-verified via double-run script
          (two independent Deps instances, identical 13-stage output).
          REMEDIATION (fresh-context review, same branch, 2026-07-04): 1
          CRITICAL fixed — the renderer registry was built but never
          consulted at runtime (PipelineService was fixed-wired to the DOCX
          renderer regardless of config["output"]["format"]); wired
          deps.resolve_renderer(config) into core_app.py's pipeline command
          and threaded the resolved renderer through
          PipelineService.run_pipeline/_stage_callables. 3 WARNINGs fixed —
          (a) format-audit-docx/qa-docx/verify_all now read the actual built
          path (or a config-driven draft_name fallback) instead of
          re-deriving the hardcoded default, so a custom draft_name no
          longer risks a missing-file error or a stale-file audit; (b)
          pipeline_stage_plan raises ValueError when assemble/all is called
          without an assemble argument instead of silently returning an
          empty/short stage list; (c) history rewritten (git reset --soft +
          re-commit, branch never pushed) so every commit on the branch now
          has a green suite — the prior four-way split shipped tests
          importing resolve_renderer before it existed; because the rename,
          the registry in cli/_shared.py and the renderer threading are
          mutually import-coupled, the rewrite groups them as one
          refactor(render) work unit followed by feat(cli) wiring and the
          test(application) extensibility proof. 3 SUGGESTIONs
          addressed — tasks.md 4.6/4.7 original wording restored with
          remediation notes appended (not overwritten); stale
          "RENDERERS registry in cli/_shared.py" / "DocxAssemblyService"
          references reworded in document_renderer_port.py and
          tool_resolver_adapter.py; the private-helper-only output-name test
          augmented with a behavior-level build() test. Final: 818 passed, 7
          skipped. Fresh-context re-review of the final branch (2026-07-05):
          MERGE-READY, zero findings; reviewer proved the CRITICAL fix is
          load-bearing by reverting the core_app.py wiring in a disposable
          worktree and observing the unregistered-format test fail. Every
          commit verified green in a clean worktree (812/7 -> 813/7 -> 818/7
          -> 818/7). Merged to main 2026-07-05 via GitHub PR #5 (merge
          commit 7777e4f, branch deleted); main verified green post-merge
          (818 passed, 7 skipped). Review budget 538 total changed lines
          (465 excluding openspec bookkeeping) — over the 400 budget; the
          overage is the review remediation belonging to this work unit,
          recorded as size:exception in the PR body per maintainer
          instruction under auto-chain.
      PR5:
        status: merged
        branch: feat/pr5-ingest-detection-routing
        pr: https://github.com/SKANL/docs/pull/6
        tasks: 5.1-5.8 complete (5.1 spike completed 2026-07-04 ahead of slice)
        tests: 839 passed, 7 skipped (baseline was 818/7; 835/7 before fresh-review remediation)
        commits:
          - 46ff2cf feat(ingest) detect source type by magic bytes with extension fallback
          - 1585a69 feat(ingest) route detected sources through SourceIngestPort with unsupported reporting
          - bbf0b10 test(ingest) lock in skip-re-ingest-by-content-hash idempotency contract
          - 89c4e6c fix(ingest) key idempotency identity on stem+kind+hash to prevent cross-kind collisions
          - 8a0de48 fix(ingest) isolate per-file exceptions so one failure does not abort the whole scan
          - plus the chore(sdd) commit carrying this state.yaml/tasks.md update
        note: >-
          New domain/ports/source_type_detector_port.py (SourceTypeDetectorPort)
          and source_ingest_port.py (SourceIngestPort); new
          infrastructure/ingest/ package with FiletypeDetectorAdapter
          (filetype lib magic-byte sniffing + .md/.txt extension fallback,
          verified empirically that docx/pdf are magic-byte detectable and
          md/txt are not); new application/ingest.py IngestService
          (detect -> route -> ingest, writes deterministic
          inbox/_detection.json with sort_keys=True and no timestamps,
          skips "_"-prefixed inbox entries so its own report is never
          re-scanned as a source). DEVIATION: the sha256/sha8 idempotency
          skip-if-output-exists check (task 5.6) was implemented directly
          inside 5.5's IngestService rather than as a separate later change
          — the deterministic <stem>-<sha8>.md path check on disk already
          satisfies "already recorded with matching hash" without a
          separate manifest lookup. test_ingest_idempotency.py locks this
          in with a naming-convention-faithful fake handler (unchanged
          source not re-invoked; changed content produces a fresh path
          without touching the prior output; partially-processed inbox
          only converts the new file) — passed on first run, same
          test-locks-existing-contract precedent as PR4 tasks 4.7-4.8.
          Confirmed via grep: zero references to IngestService/
          SourceIngestPort/SourceTypeDetectorPort/FiletypeDetectorAdapter in
          application/pipeline.py, domain/pipeline.py, or cli/_shared.py —
          PR6 (adapters) and PR8 (pipeline/CLI wiring) own that, so
          reverting PR5 has zero blast radius. No real pandoc/
          opendataloader-pdf calls made this slice (stub/fake handlers
          only, per design's routing-infra-first plan). Review budget: 411
          added lines across 8 files (all new files, no existing-file
          edits), slightly over the ~260-line forecast but not requiring a
          delivery_strategy escalation (test-heavy per strict TDD, no
          production wiring risk). FRESH-CONTEXT REVIEW REMEDIATION
          (2026-07-05, same branch): verdict MERGE-READY with 2 WARNINGs
          fixed before push. WARNING 1 (identity collision) — the
          stem+sha8-only skip key let readme.md/readme.txt with
          byte-identical bodies collide (same stem, same hash); reviewer's
          repro reproduced live (txt handler invoked 0 times, wrongly
          "skipped"). Fixed by extending the deterministic output naming to
          <stem>-<kind>-<sha8>.md, keying identity on (stem, kind, hash);
          locked in by test_same_stem_and_hash_but_different_kind_are_not_conflated.
          WARNING 2 (batch-fatal per-file errors) — detect/read/ingest had
          no exception isolation; one vanished/unreadable file or a failing
          handler aborted the whole scan and _detection.json was never
          written even for already-processed files. Fixed by wrapping each
          file's processing in IngestService._ingest_one_safely: any
          exception is caught and reported as status "error" with a
          deterministic cause (str(exc), no traceback/timestamp), the scan
          continues, and _detection.json is always written. Scoped
          narrowly — does not implement PR6 task 6.3's configured
          fail-fast for real adapters. Both fixes RED-confirmed against
          live reproductions before implementation, tests added
          alongside each fix commit.
        merge: >-
          Merged to main 2026-07-05 via GitHub PR #6 (merge commit 2b0690f,
          branch deleted); main verified green post-merge (839 passed, 7
          skipped). Fresh-context review round 2: MERGE-READY, zero blocking
          findings — both original failure scenarios re-run and confirmed
          closed, new tests mutation-checked (3 mutations, all killed),
          per-commit greenness verified across the branch. Two non-blocking
          carry-forwards recorded as a binding note on PR6 task 6.3 (commit
          eb039d0): (a) temp-then-atomic-rename or skip-check invalidation
          so partial outputs from failed handlers are never accepted as
          "skipped"; (b) preserve detector-resolved kind in error entries.
          Final review budget: 546 code insertions (all-new files, unwired,
          ~60% tests) — size:exception recorded in the PR body per
          maintainer instruction under auto-chain.
      PR6:
        status: merged
        branch: feat/pr6-ingest-adapters
        pr: https://github.com/SKANL/docs/pull/7
        tasks: 6.1-6.10 complete
        tests: 873 passed, 7 skipped (baseline was 839/7; 869/7 before fresh-review remediation)
        commits:
          - b8f7cdd fix(ingest) preserve detected kind in error entries; extract shared naming helper
          - 1b8168c feat(ingest) add pandoc adapter for docx/odt with atomic media extraction
          - 79cdfc3 feat(ingest) add opendataloader-pdf adapter with batched JVM conversion
          - 9f22c8c feat(ingest) add md/txt normalize adapter and wire all three into Deps
          - e52058c test(ingest) prove byte-identical determinism across repeated runs
          - 0faca2d fix(ingest) thread detector-resolved kind through SourceIngestPort
        note: >-
          Three SourceIngestPort adapters delivered: PandocIngestAdapter
          (docx/odt, --extract-media, explicit -f reader), OpendataloaderPdfAdapter
          (Java via ToolResolverPort.resolve_java with Spanish error message,
          ONE batched convert() per inbox scan verified by spy test,
          hybrid/image_output off for determinism per 5.1 spike conditions,
          inputs staged as .pdf-suffixed scratch copies because the tool's CLI
