          split_frontmatter). Shared domain/ingest_naming.py and
          infrastructure/ingest/atomic_ingest_write.py (temp-then-atomic-rename)
          satisfy PR5 carry-forward (a); error entries preserving the
          detector-resolved kind satisfy carry-forward (b) — both closed on
          PR6 task 6.3 as bound. Fresh-context review round 1: NOT-READY —
          1 CRITICAL (adapters derived kind from src.suffix instead of the
          detected kind: a real DOCX named .doc detected/routed correctly but
          failed pandoc conversion permanently AND its suffix-derived output
          name broke the (stem, kind, sha8) skip-check identity) and 1 WARNING
          (two-step finalize could orphan a media dir and break the retry with
          directory-not-empty). Remediation 0faca2d: SourceIngestPort.ingest
          grew a required kind parameter (additive port deviation documented
          in tasks.md 6.7) so the router's resolved kind is the single source
          of identity for naming and format decisions; the RED test for the
          pdf naming case surfaced a second real bug (opendataloader-pdf's CLI
          rejects non-.pdf-named input), fixed via scratch-copy staging;
          pandoc retry reconciles stale orphaned media dirs before
          re-finalize. Round 2: MERGE-READY, zero blocking findings —
          reviewer independently re-reproduced every round-1 scenario with
          real pandoc 3.10 + OpenJDK 17, verified per-commit greenness of all
          8 commits, hexagonal boundaries, determinism invariants, and
          additive-only planning-artifact edits. SUGGESTION deferred:
          extract shared Java-resolution module (noted in tasks.md 6.4).
          Informational: test_doctor_service.py ToolResolverPort fake lacks
          resolve_java (harmless today, would fail loudly); design.md:81
          still shows the pre-deviation 2-arg ingest sketch (frozen-artifact
          convention). Merged to main 2026-07-05 via GitHub PR #7 (merge
          commit 2efbda5, branch deleted); main verified green post-merge
          (873 passed, 7 skipped). Review budget: 1,201 insertions / 34
          deletions across 20 files — size:exception recorded in the PR body
          per maintainer decision at the interactive slice-close checkpoint
          (overage ~60% real-external-tool integration tests, all-new files,
          remediation entangles the port signature across all three adapters
          making a post-hoc split require history surgery).
      PR7:
        status: implemented
        branch: feat/pr7-context-files-index
        tasks: 7.1-7.10 complete
        tests: 895 passed, 7 skipped (baseline was 877/7; 893/7 before fresh-review remediation)
        commits:
          - 9849397 feat(context-curation) add deterministic context-file skeletons and progressive-disclosure index
          - 0e5ef8f fix(context-curation) harden AGENT-FILL merge and align marker naming with design
          - plus the chore(sdd) commit carrying this state.yaml update
        note: >-
          New application/context_files.py (pure functions, zero infrastructure
          imports, additive and unwired — zero references from
          application/pipeline.py, domain/pipeline.py, or cli/_shared.py;
          wiring is PR8's job per the PR5/PR6 precedent). Deterministic
