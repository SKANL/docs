          progressive-disclosure context/index.md builder reusing
          read_context_texts skip rules, determinism and no-auto-invoke tests.
          SCOPE DECISION (validated by both review rounds): the pre-existing
          JsonContextRepository.regenerate_index (Topic/Q&A subsystem) was NOT
          migrated — the context-curation spec is silent on it and design.md's
          File Changes table lists context_files.py as Create only. CARRY-
          FORWARD recorded as binding note on task 8.1: that subsystem already
          writes its own context/index.md (topic-status table) at the SAME
          path build_context_index targets with an incompatible 3-level
          format; PR8's wiring MUST resolve the collision (consolidate or
          namespace). FRESH-REVIEW ROUND 1 (MERGE-READY, 3 SUGGESTIONs +
          1 WARNING) remediated in 0e5ef8f: malformed AGENT-FILL block
          (START without END) now raises a deterministic ValueError instead
          of silently discarding agent content (fail-loud reading of the
          spec's MUST NOT discard, consistent with the module's existing
          unknown-concern convention); CRLF/CR input normalized to LF before
          marker matching (output stays LF-only); marker naming aligned to
          design.md's literal AGENT-FILL:curated-<concern> example across all
          five concerns (old marker string has zero surviving references).
          ROUND 2 (2026-07-05): MERGE-READY, all four findings CLOSED with
          live repros, zero new findings; per-commit greenness verified in
          disposable worktrees (893/7 -> 895/7); ValueError message confirmed
          deterministic. TDD self-correction disclosed by implementer:
          build_context_index was initially written before its 7.5 RED test,
          removed, RED re-confirmed genuinely, then restored as 7.6's GREEN.
          Review budget: 454 total changed lines (444 insertions + 10
          deletions; ~40 of them openspec bookkeeping) — modestly over the
          400 budget; both review rounds ruled size:exception defensible
          (single cohesive unwired module, splitting would fragment a unit
